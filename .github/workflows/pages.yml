name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つだけに制限し、キューイング中のランはキャンセルしない
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. メインリポジトリ (docs/ を含む) をチェックアウト ──
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      # ── 2. データリポジトリ (anicheck-data) をチェックアウト ──
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: lalate/anicheck-data
          # パブリックリポジトリの場合トークン不要。
          # プライベートの場合は Personal Access Token を
          # Settings > Secrets > DATA_REPO_TOKEN に登録し、下行を有効化:
          # token: ${{ secrets.DATA_REPO_TOKEN }}
          path: data-repo

      # ── 3. docs/data/ にJSONをコピー & anime_list.json を生成 ──
      - name: Copy data files and generate anime_list.json
        run: |
          set -euo pipefail

          mkdir -p main-repo/docs/data/current

          # トップレベルJSONをコピー（存在するもののみ）
          for f in broadcast.json episode.json; do
            [ -f "data-repo/$f" ] && cp "data-repo/$f" "main-repo/docs/data/$f" || true
          done

          # current/ 配下を全コピー
          if [ -d "data-repo/current" ]; then
            cp -r data-repo/current/. main-repo/docs/data/current/
          fi

          # 依存関係のインストール
          pip install requests

          # current/*_master.json を結合し、Jikan APIから画像URLを取得して anime_list.json を生成
          python3 - << 'PYEOF'
          import json, glob, os, sys, time, requests
          from urllib.parse import quote

          master_files = sorted(glob.glob('data-repo/current/*_master.json'))
          anime_list = []
          for path in master_files:
              try:
                  with open(path, encoding='utf-8') as f:
                      data = json.load(f)
                  anime_list.append(data)
              except Exception as e:
                  print(f'[WARN] スキップ: {path} ({e})', file=sys.stderr)

          # Jikan APIから情報を取得
          for i, anime in enumerate(anime_list):
              title = anime.get('title', '')
              if not title:
                  anime['image_url'] = None
                  continue

              query = quote(title)
              url = f"https://api.jikan.moe/v4/anime?q={query}"
              try:
                  response = requests.get(url, timeout=10)
                  if response.status_code == 429:
                      print(f'[WARN] Rate limit hit for {title}. Sleeping 5 seconds...', file=sys.stderr)
                      time.sleep(5)
                      response = requests.get(url, timeout=10)
                  response.raise_for_status()
                  data = response.json()
                  if data.get('data') and len(data['data']) > 0:
                      # 先頭のデータを利用
                      jikan_data = data['data'][0]
                      
                      # 1. 画像URL
                      images = jikan_data.get('images', {})
                      image_url = images.get('jpg', {}).get('image_url') or images.get('webp', {}).get('image_url')
                      anime['image_url'] = image_url if image_url else None
                      
                      # 2. Genres / Themes
                      genres = [g['name'] for g in jikan_data.get('genres', [])]
                      themes = [t['name'] for t in jikan_data.get('themes', [])]
                      anime['genres'] = genres
                      anime['themes'] = themes
                      
                      # 3. Studio
                      studios = [s['name'] for s in jikan_data.get('studios', [])]
                      if studios:
                          anime['jikan_studio'] = studios[0] # Grokのstaff.studioを上書き可能に
                          
                      # 4. Trailer
                      trailer = jikan_data.get('trailer', {})
                      if trailer.get('youtube_id'):
                          anime['jikan_trailer_url'] = trailer.get('url')
                          anime['jikan_trailer_id'] = trailer.get('youtube_id')
                          
                      # 5. Status & Source
                      anime['jikan_status'] = jikan_data.get('status')
                      anime['jikan_source'] = jikan_data.get('source')
                      
                      # 6. Titles (English/Japanese)
                      titles = jikan_data.get('titles', [])
                      anime['title_english'] = next((t['title'] for t in titles if t['type'] == 'English'), None)
                      anime['title_japanese'] = next((t['title'] for t in titles if t['type'] == 'Japanese'), None)
                      
                      print(f'[INFO] Enriched data for {title}: {image_url}')
                  else:
                      anime['image_url'] = None
                      print(f'[WARN] No data found for {title}')
              except Exception as e:
                  print(f"[ERROR] fetching data for {title}: {e}", file=sys.stderr)
                  anime['image_url'] = None

              # レートリミット対応 (3 requests/second)
              time.sleep(0.4)

              # 分制限対応 (60 requests/minute) - 少し余裕を持たせて50件ごとに60秒待機
              if (i + 1) % 50 == 0:
                  print("[INFO] Waiting for minute rate limit...", file=sys.stderr)
                  time.sleep(60)

          out_path = 'main-repo/docs/data/anime_list.json'
          with open(out_path, 'w', encoding='utf-8') as f:
              json.dump(anime_list, f, ensure_ascii=False, indent=2)

          print(f'[OK] anime_list.json を生成しました ({len(anime_list)} 件)')
          PYEOF

      # ── 4. GitHub Pages の設定 ──
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ── 5. docs/ ディレクトリ全体をアーティファクトとしてアップロード ──
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: main-repo/docs

      # ── 6. GitHub Pages にデプロイ ──
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
